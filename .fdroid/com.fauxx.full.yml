# UpdateCheckMode: Tags tells the fdroid bot to notify when a new git tag
# appears. AutoUpdateMode is deliberately omitted — the project's versionCode
# is derived from total tag count (not from tag name), so the auto-update bot
# cannot infer the next versionCode from a new tag. Each new release should
# land as a manual fdroiddata MR that adds a new Builds block.
# When the versionCode scheme is changed to something tag-derivable, enable
# AutoUpdateMode: Version + an appropriate VercodeOperation.
UpdateCheckMode: Tags
