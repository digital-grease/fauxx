name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.flavorName }} Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: play
            flavorName: Play
            gradleTask: bundlePlayRelease
            artifactSrcDir: app/build/outputs/bundle/playRelease
            artifactSrcName: app-play-release.aab
            artifactExt: aab
          - flavor: full
            flavorName: Full
            gradleTask: assembleFullRelease
            artifactSrcDir: app/build/outputs/apk/full/release
            artifactSrcName: app-full-release.apk
            artifactExt: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build ${{ matrix.flavorName }} artifact
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew ${{ matrix.gradleTask }} \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename artifact
        run: |
          VERSION="${{ github.ref_name }}"
          mv "${{ matrix.artifactSrcDir }}/${{ matrix.artifactSrcName }}" \
             "${{ matrix.artifactSrcDir }}/fauxx-${{ matrix.flavor }}-${VERSION}.${{ matrix.artifactExt }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.flavor }}
          path: ${{ matrix.artifactSrcDir }}/fauxx-${{ matrix.flavor }}-*.${{ matrix.artifactExt }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fauxx ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/fauxx-play-*.aab
            artifacts/fauxx-full-*.apk
