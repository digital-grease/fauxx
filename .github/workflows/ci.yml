name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: play
            flavorName: Play
          - flavor: full
            flavorName: Full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test${{ matrix.flavorName }}DebugUnitTest

      - name: Android Lint
        if: matrix.flavor == 'play'
        run: ./gradlew lint${{ matrix.flavorName }}Debug

      - name: Build debug APK
        run: ./gradlew assemble${{ matrix.flavorName }}Debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.flavor }}
          path: app/build/reports/tests/

      - name: Upload lint results
        if: always() && matrix.flavor == 'play'
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ matrix.flavor }}
          path: app/build/reports/lint-results-*.html

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/app-${{ matrix.flavor }}-debug.apk
