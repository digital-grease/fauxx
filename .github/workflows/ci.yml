name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: play
            flavorName: Play
          - flavor: full
            flavorName: Full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test${{ matrix.flavorName }}DebugUnitTest

      - name: Coverage gate (ratcheting)
        if: matrix.flavor == 'play'
        run: ./gradlew koverVerifyPlayDebug

      - name: Android Lint
        if: matrix.flavor == 'play'
        run: ./gradlew lint${{ matrix.flavorName }}Debug

      - name: Build debug APK
        run: ./gradlew assemble${{ matrix.flavorName }}Debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.flavor }}
          path: app/build/reports/tests/

      - name: Upload lint results
        if: always() && matrix.flavor == 'play'
        uses: actions/upload-artifact@v7
        with:
          name: lint-results-${{ matrix.flavor }}
          path: app/build/reports/lint-results-*.html

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/app-${{ matrix.flavor }}-debug.apk

  # Posts (and updates in place) a coverage summary on each PR. The hard gate is
  # koverVerifyPlayDebug in the build job above; this is just the at-a-glance number so a
  # reviewer sees where a change moves coverage without opening the report artifact.
  coverage-comment:
    name: Coverage comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate coverage XML
        run: ./gradlew koverXmlReportPlayDebug

      - name: Extract line coverage
        id: cov
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import xml.etree.ElementTree as ET
          root = ET.parse("app/build/reports/kover/reportPlayDebug.xml").getroot()
          line = [c for c in root.findall("counter") if c.get("type") == "LINE"][0]
          covered = int(line.get("covered"))
          total = covered + int(line.get("missed"))
          pct = (100.0 * covered / total) if total else 0.0
          print(f"pct={pct:.2f}")
          print(f"covered={covered}")
          print(f"total={total}")
          PY

      - name: Post sticky coverage comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-playdebug
          message: |
            ### 📊 Code coverage (playDebug)

            **${{ steps.cov.outputs.pct }}%** line coverage — ${{ steps.cov.outputs.covered }} / ${{ steps.cov.outputs.total }} lines covered · ratchet floor **52%**

            Hard-gated by `koverVerifyPlayDebug`. Raise `app/kover-baseline.properties` as coverage grows. Generated code and Compose UI screens are excluded from the measurement.
