name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests (full flavor)
        run: ./gradlew testFullDebugUnitTest

      - name: Run unit tests (play flavor)
        run: ./gradlew testPlayDebugUnitTest

      - name: Android Lint (play flavor)
        run: ./gradlew lintPlayDebug

      - name: Build debug APKs
        run: ./gradlew assemblePlayDebug assembleFullDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: |
            app/build/outputs/apk/play/debug/app-play-debug.apk
            app/build/outputs/apk/full/debug/app-full-debug.apk
